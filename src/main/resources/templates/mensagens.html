<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.title}">Mural</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="~{cabecalho :: siteHeader}"></div>
<h1 th:text="#{mensagens.title}">Mensagens</h1>
<ul>
    <li><a th:href="@{/}" th:text="#{link.home}">Home</a></li>
    <li><a th:href="@{/postar}" th:text="#{link.postar_mensagem}">Postar uma nova mensagem</a></li>
    <li><a th:href="@{/mensagens}" th:text="#{link.atualizar}">Atualizar página</a></li>
</ul>
<br>

<div th:if="${success}" th:text="${success}" class="success-message"></div>

<div th:if="${#lists.isEmpty(messages)}">
    <p th:text="#{msg.empty}">Sem mensagens.</p>
</div>
<div th:unless="${#lists.isEmpty(messages)}">
    <h4><span th:text="#{msg.count}"></span> <span th:text="${messages.size()}"></span></h4>
    <div th:each="msg : ${messages}">
        <div>
            <strong th:text="#{msg.from}">De:</strong> <span th:text="${msg.from()}"></span>
            &nbsp;
            <strong th:text="#{msg.to}">Para:</strong> <span th:text="${msg.to()}"></span>
            (em <span th:text="${msg.timestamp()}"></span>)
        </div>
        <div th:text="${msg.message()}"></div>
    </div>
</div>
</body>
</html>
