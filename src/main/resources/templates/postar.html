<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.title}">Mural</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:insert="~{cabecalho :: siteHeader}"></div>
<h1 th:text="#{postar.title}">Envie uma mensagem para o Mural</h1>
<ul>
    <li><a th:href="@{/}" th:text="#{link.home}">Home</a></li>
    <li><a th:href="@{/mensagens}" th:text="#{link.ver_mensagens}">Ver Mensagens</a></li>
</ul>

<form th:action="@{/postar}" th:object="${sendMessageForm}" method="post">
    <label for="from" th:text="#{form.from}">Enviado por:</label><br>
    <input type="text" th:field="*{from}"><br>
    <div th:if="${#fields.hasErrors('from')}" th:errors="*{from}" class="error-message"></div>
    <br>

    <label for="to" th:text="#{form.to}">Enviado para:</label><br>
    <input type="text" th:field="*{to}"><br>
    <div th:if="${#fields.hasErrors('to')}" th:errors="*{to}" class="error-message"></div>
    <br>

    <label for="message" th:text="#{form.message}">Mensagem:</label><br>
    <textarea th:field="*{message}" rows="6" cols="40"></textarea><br>
    <div th:if="${#fields.hasErrors('message')}" th:errors="*{message}" class="error-message"></div>
    <br>

    <button type="submit" th:text="#{form.submit}">Enviar</button><br>
</form>
</body>
</html>
